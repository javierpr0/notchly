name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve dependencies
        run: xcodebuild -project Notchy.xcodeproj -scheme Notchy -resolvePackageDependencies

      - name: Build Release
        run: |
          xcodebuild -project Notchy.xcodeproj \
            -scheme Notchy \
            -configuration Release \
            -derivedDataPath build-release \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            build

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build-release/Build/Products/Release/Notchly.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Notchly" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            Notchly.dmg

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" Notchly.dmg \
            --title "Notchly ${{ github.ref_name }}" \
            --generate-notes
