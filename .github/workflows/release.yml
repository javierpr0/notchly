name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-16
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Resolve dependencies
        run: xcodebuild -project Notchy.xcodeproj -scheme Notchy -resolvePackageDependencies

      - name: Build Release
        run: |
          xcodebuild -project Notchy.xcodeproj \
            -scheme Notchy \
            -configuration Release \
            -derivedDataPath build-release \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build-release/Build/Products/Release/Notchy.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Notchy" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            Notchy.dmg

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" Notchy.dmg \
            --title "Notchy ${{ github.ref_name }}" \
            --generate-notes
